<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rie Linux</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:#00ff00;
    font-family:monospace;
    min-height:100vh;
}

nav{
    background:#000;
    border-bottom:1px solid #00ff00;
    padding:15px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}

nav a{
    color:#00ff00;
    text-decoration:none;
    font-size:18px;
}

nav a:hover{
    text-decoration:underline;
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px 20px;
}

section{
    padding:50px 0;
}

h1{
    font-size:clamp(2rem, 6vw, 4rem);
    margin-bottom:15px;
}

h2{
    margin-bottom:15px;
}

p{
    line-height:1.6;
}

.hero{
    text-align:center;
    padding:80px 0;
}

/* Tampilan HP */
@media (max-width: 600px){

    nav{
        flex-direction:column;
        align-items:center;
    }

    nav a{
        width:100%;
        text-align:center;
        padding:8px;
    }

    .hero{
        padding:40px 0;
    }
}

</style>
</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
</nav>

<div class="container">

    <section id="home" class="hero">
        <h1>RIE LINUX</h1>
        <p>Website pertama saya di GitHub Pages</p>
    </section>

    <section id="about">
        <h2>About</h2>
        <p>Saya pengguna Linux dan penggemar teknologi.</p>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <p>Email: admin@example.com</p>
    </section>

</div>

</body>
</html>
